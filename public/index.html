<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGS 廣告監控平台 - 登入</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    /* Login Page */
    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-card { background: #1e293b; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
    .login-card h1 { text-align: center; font-size: 1.5rem; margin-bottom: 8px; color: #f8fafc; }
    .login-card .subtitle { text-align: center; color: #94a3b8; font-size: 0.875rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: #3b82f6; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #1e40af; opacity: 0.6; cursor: not-allowed; }
    .error-msg { color: #f87171; font-size: 0.85rem; text-align: center; margin-top: 12px; min-height: 20px; }

    /* Dashboard */
    .dashboard { display: none; }
    .topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 1.1rem; color: #f8fafc; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-badge { font-size: 0.85rem; color: #94a3b8; }
    .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .role-admin { background: #7c3aed20; color: #a78bfa; border: 1px solid #7c3aed40; }
    .role-viewer { background: #06b6d420; color: #67e8f9; border: 1px solid #06b6d440; }
    .btn-sm { padding: 6px 14px; font-size: 0.85rem; border-radius: 6px; border: none; cursor: pointer; }
    .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
    .btn-outline:hover { border-color: #64748b; color: #e2e8f0; }
    .btn-danger { background: #dc262620; border: 1px solid #dc262640; color: #f87171; }
    .btn-danger:hover { background: #dc262640; }

    /* Apps grid */
    .content { padding: 24px; max-width: 1000px; margin: 0 auto; }
    .section-title { font-size: 1rem; color: #94a3b8; margin-bottom: 16px; }
    .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .app-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; transition: all 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
    .app-card:hover { border-color: #3b82f6; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59,130,246,0.15); }
    .app-card h3 { font-size: 1.1rem; margin-bottom: 8px; color: #f8fafc; }
    .app-card p { font-size: 0.85rem; color: #64748b; line-height: 1.5; }
    .app-icon { font-size: 2rem; margin-bottom: 12px; }

    /* Admin panel */
    .admin-section { display: none; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .users-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
    .users-table th, .users-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; font-size: 0.875rem; }
    .users-table th { color: #64748b; font-weight: 600; background: #0f172a; }
    .users-table tr:last-child td { border-bottom: none; }
    .status-active { color: #4ade80; }
    .status-inactive { color: #f87171; }
    .actions { display: flex; gap: 6px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1e293b; border-radius: 12px; padding: 28px; width: 100%; max-width: 440px; }
    .modal h2 { font-size: 1.2rem; margin-bottom: 20px; color: #f8fafc; }
    .modal .form-group { margin-bottom: 16px; }
    .modal select { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
    .tab { padding: 8px 16px; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: none; background: transparent; color: #64748b; }
    .tab.active { background: #334155; color: #f8fafc; }
    .tab:hover:not(.active) { color: #94a3b8; }

    /* Password section */
    .password-section { background: #1e293b; border-radius: 12px; padding: 24px; max-width: 480px; }
    .password-section h3 { margin-bottom: 16px; }
    .success-msg { color: #4ade80; font-size: 0.85rem; margin-top: 8px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginPage" class="login-container">
  <div class="login-card">
    <h1>IGS 廣告監控平台</h1>
    <p class="subtitle">請使用公司信箱登入</p>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="yourname@igs.com.tw" required>
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="loginPassword" placeholder="請輸入密碼" required>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">登入</button>
      <p class="error-msg" id="loginError"></p>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboardPage" class="dashboard">
  <div class="topbar">
    <h1>IGS 廣告監控平台</h1>
    <div class="topbar-right">
      <span class="user-badge" id="userInfo"></span>
      <button class="btn-sm btn-outline" onclick="logout()">登出</button>
    </div>
  </div>

  <div class="content">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('apps', this)">應用程式</button>
      <button class="tab" onclick="switchTab('admin', this)" id="adminTab" style="display:none">使用者管理</button>
      <button class="tab" onclick="switchTab('password', this)">修改密碼</button>
    </div>

    <!-- Apps Tab -->
    <div id="appsSection">
      <p class="section-title">選擇要使用的工具</p>
      <div class="apps-grid" id="appsGrid">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- Admin Tab -->
    <div id="adminSection" class="admin-section">
      <div class="admin-header">
        <p class="section-title">使用者管理（共 <span id="userCount">0</span> 人）</p>
        <button class="btn-sm btn-primary" onclick="openCreateModal()">+ 新增使用者</button>
      </div>
      <table class="users-table">
        <thead>
          <tr><th>姓名</th><th>Email</th><th>角色</th><th>狀態</th><th>最後登入</th><th>操作</th></tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>

    <!-- Password Tab -->
    <div id="passwordSection" class="admin-section">
      <div class="password-section">
        <h3>修改密碼</h3>
        <form id="passwordForm">
          <div class="form-group">
            <label>目前密碼</label>
            <input type="password" id="currentPassword" required>
          </div>
          <div class="form-group">
            <label>新密碼（至少 6 個字元）</label>
            <input type="password" id="newPassword" required minlength="6">
          </div>
          <div class="form-group">
            <label>確認新密碼</label>
            <input type="password" id="confirmPassword" required>
          </div>
          <button type="submit" class="btn btn-primary">更新密碼</button>
          <p class="error-msg" id="passwordError"></p>
          <p class="success-msg" id="passwordSuccess"></p>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Create/Edit User Modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <h2 id="modalTitle">新增使用者</h2>
    <form id="userForm">
      <input type="hidden" id="editUserId">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="userName" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="userEmail" required>
      </div>
      <div class="form-group">
        <label>密碼<span id="passwordHint">（至少 6 個字元）</span></label>
        <input type="password" id="userPassword" minlength="6">
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="userRole">
          <option value="viewer">僅讀取（Viewer）</option>
          <option value="admin">讀寫管理（Admin）</option>
        </select>
      </div>
      <p class="error-msg" id="modalError"></p>
      <div class="modal-actions">
        <button type="button" class="btn-sm btn-outline" onclick="closeModal()">取消</button>
        <button type="submit" class="btn-sm btn-primary" id="modalSubmitBtn">建立</button>
      </div>
    </form>
  </div>
</div>

<script>
// ─── Config ───
const APP_CONFIGS = [
  {
    name: 'Meta Ads Reviewer',
    description: '管理 Meta 廣告拒登審查、素材替換、審查追蹤',
    icon: '📊',
    url: '', // Will be set from env or config
    urlKey: 'META_ADS_URL',
    defaultUrl: 'https://meta-ads-reviewer-production-0cd5.up.railway.app',
  },
  {
    name: 'Apple Ads Monitor',
    description: 'Apple Search Ads 廣告數據監控、Campaign 分析',
    icon: '🍎',
    url: '',
    urlKey: 'APPLE_ADS_URL',
    defaultUrl: '',
  },
];

let currentUser = null;
let authToken = localStorage.getItem('auth_token') || '';

// ─── API Helpers ───
async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(path, { ...options, headers, credentials: 'include' });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── Auth ───
async function checkAuth() {
  if (!authToken) return showLogin();
  try {
    const data = await api('/api/auth/verify');
    currentUser = data.user;
    showDashboard();
  } catch {
    authToken = '';
    localStorage.removeItem('auth_token');
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('dashboardPage').style.display = 'none';
}

function showDashboard() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';

  // User info
  const roleLabel = currentUser.role === 'admin' ? '管理員' : '僅讀取';
  const roleClass = currentUser.role === 'admin' ? 'role-admin' : 'role-viewer';
  document.getElementById('userInfo').innerHTML =
    `${currentUser.name} <span class="role-badge ${roleClass}">${roleLabel}</span>`;

  // Show admin tab for admins
  document.getElementById('adminTab').style.display = currentUser.role === 'admin' ? '' : 'none';

  // Render apps
  renderApps();
}

function renderApps() {
  const grid = document.getElementById('appsGrid');
  grid.innerHTML = APP_CONFIGS.map(app => {
    const url = app.url || app.defaultUrl;
    if (!url) return `
      <div class="app-card" style="opacity:0.5; cursor:default">
        <div class="app-icon">${app.icon}</div>
        <h3>${app.name}</h3>
        <p>${app.description}</p>
        <p style="color:#f59e0b; margin-top:8px; font-size:0.8rem">尚未設定連結</p>
      </div>`;
    // Pass token via URL parameter for cross-origin apps
    const appUrl = `${url}?auth_token=${encodeURIComponent(authToken)}`;
    return `
      <a href="${appUrl}" target="_blank" class="app-card">
        <div class="app-icon">${app.icon}</div>
        <h3>${app.name}</h3>
        <p>${app.description}</p>
      </a>`;
  }).join('');
}

// Login form
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  errorEl.textContent = '';
  btn.disabled = true;
  btn.textContent = '登入中...';

  try {
    const data = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });
    authToken = data.token;
    localStorage.setItem('auth_token', authToken);
    currentUser = data.user;

    // If redirected from another app, go back with token
    const redirectUrl = new URLSearchParams(window.location.search).get('redirect');
    if (redirectUrl) {
      const url = new URL(redirectUrl);
      url.searchParams.set('token', authToken);
      window.location.href = url.toString();
      return;
    }

    showDashboard();
  } catch (err) {
    errorEl.textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '登入';
  }
});

async function logout() {
  try { await api('/api/auth/logout', { method: 'POST' }); } catch {}
  authToken = '';
  localStorage.removeItem('auth_token');
  currentUser = null;
  showLogin();
}

// ─── Tabs ───
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  document.getElementById('appsSection').style.display = tab === 'apps' ? 'block' : 'none';
  document.getElementById('adminSection').style.display = tab === 'admin' ? 'block' : 'none';
  document.getElementById('passwordSection').style.display = tab === 'password' ? 'block' : 'none';

  if (tab === 'admin') loadUsers();
}

// ─── Admin: User Management ───
async function loadUsers() {
  try {
    const data = await api('/api/admin/users');
    document.getElementById('userCount').textContent = data.users.length;
    const tbody = document.getElementById('usersBody');
    tbody.innerHTML = data.users.map(u => {
      const roleLabel = u.role === 'admin' ? '管理員' : '僅讀取';
      const roleClass = u.role === 'admin' ? 'role-admin' : 'role-viewer';
      const statusClass = u.is_active ? 'status-active' : 'status-inactive';
      const statusLabel = u.is_active ? '啟用' : '停用';
      const lastLogin = u.last_login ? new Date(u.last_login).toLocaleDateString('zh-TW') : '從未';
      return `<tr>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td><span class="role-badge ${roleClass}">${roleLabel}</span></td>
        <td><span class="${statusClass}">${statusLabel}</span></td>
        <td>${lastLogin}</td>
        <td class="actions">
          <button class="btn-sm btn-outline" onclick='openEditModal(${JSON.stringify(u)})'>編輯</button>
          ${u.id !== currentUser.id ? `<button class="btn-sm btn-danger" onclick="toggleActive(${u.id}, ${!u.is_active})">${u.is_active ? '停用' : '啟用'}</button>` : ''}
        </td>
      </tr>`;
    }).join('');
  } catch (err) {
    console.error('Failed to load users:', err);
  }
}

function openCreateModal() {
  document.getElementById('modalTitle').textContent = '新增使用者';
  document.getElementById('modalSubmitBtn').textContent = '建立';
  document.getElementById('editUserId').value = '';
  document.getElementById('userName').value = '';
  document.getElementById('userEmail').value = '';
  document.getElementById('userEmail').disabled = false;
  document.getElementById('userPassword').value = '';
  document.getElementById('userPassword').required = true;
  document.getElementById('passwordHint').textContent = '（至少 6 個字元）';
  document.getElementById('userRole').value = 'viewer';
  document.getElementById('modalError').textContent = '';
  document.getElementById('userModal').classList.add('active');
}

function openEditModal(user) {
  document.getElementById('modalTitle').textContent = '編輯使用者';
  document.getElementById('modalSubmitBtn').textContent = '更新';
  document.getElementById('editUserId').value = user.id;
  document.getElementById('userName').value = user.name;
  document.getElementById('userEmail').value = user.email;
  document.getElementById('userEmail').disabled = true;
  document.getElementById('userPassword').value = '';
  document.getElementById('userPassword').required = false;
  document.getElementById('passwordHint').textContent = '（留空不修改）';
  document.getElementById('userRole').value = user.role;
  document.getElementById('modalError').textContent = '';
  document.getElementById('userModal').classList.add('active');
}

function closeModal() {
  document.getElementById('userModal').classList.remove('active');
}

document.getElementById('userForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('editUserId').value;
  const name = document.getElementById('userName').value;
  const email = document.getElementById('userEmail').value;
  const password = document.getElementById('userPassword').value;
  const role = document.getElementById('userRole').value;
  const errorEl = document.getElementById('modalError');

  try {
    if (id) {
      const body = { name, role };
      if (password) body.password = password;
      await api(`/api/admin/users/${id}`, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      await api('/api/admin/users', { method: 'POST', body: JSON.stringify({ email, name, password, role }) });
    }
    closeModal();
    loadUsers();
  } catch (err) {
    errorEl.textContent = err.message;
  }
});

async function toggleActive(id, active) {
  const action = active ? '啟用' : '停用';
  if (!confirm(`確定要${action}此使用者？`)) return;
  try {
    await api(`/api/admin/users/${id}`, { method: 'PUT', body: JSON.stringify({ is_active: active }) });
    loadUsers();
  } catch (err) {
    alert(err.message);
  }
}

// ─── Password Change ───
document.getElementById('passwordForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const currentPw = document.getElementById('currentPassword').value;
  const newPw = document.getElementById('newPassword').value;
  const confirmPw = document.getElementById('confirmPassword').value;
  const errorEl = document.getElementById('passwordError');
  const successEl = document.getElementById('passwordSuccess');

  errorEl.textContent = '';
  successEl.textContent = '';

  if (newPw !== confirmPw) {
    errorEl.textContent = '新密碼與確認密碼不一致';
    return;
  }

  try {
    await api('/api/auth/change-password', {
      method: 'POST',
      body: JSON.stringify({ currentPassword: currentPw, newPassword: newPw }),
    });
    successEl.textContent = '密碼已更新成功！';
    document.getElementById('passwordForm').reset();
  } catch (err) {
    errorEl.textContent = err.message;
  }
});

// ─── Init ───
checkAuth();
</script>
</body>
</html>
